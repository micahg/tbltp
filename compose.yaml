services:
  mongo:
    image: mongo:8.0.4
    ports:
      - 27017:27017
  localstack:
    image: localstack/localstack:latest
    ports:
      - 4566:4566
    environment:
      - SERVICES=s3
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./packages/api/test/localstack:/etc/localstack/init/ready.d
  api:
    image: "ghcr.io/micahg/tbltp-api:0.33.0"
    ports:
      - 3000:3000
    depends_on:
      - mongo
    environment:
      - MONGO_URL=mongodb://mongo:27017/tbltp
      - DISABLE_AUTH=true
  ui:
    image: "ghcr.io/micahg/tbltp-mui:0.27.0"
    ports:
      - "8080:80"
    depends_on:
      - api
    environment:
      - API_URL=http://127.0.0.1:3000
      - WS_URL=ws://127.0.0.1:3000
